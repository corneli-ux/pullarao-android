name: Build APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Print signing SHA-1 (for Firebase Console)
        run: |
          echo "=== Full signing report ==="
          ./gradlew signingReport --no-daemon 2>&1 | tail -30
          echo ""
          echo "=== Extract SHA-1 from built APK ==="
          APKSIGNER=$(find $ANDROID_HOME -name apksigner 2>/dev/null | head -1)
          if [ -n "$APKSIGNER" ]; then
            $APKSIGNER verify --print-certs app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | grep -i sha1
          else
            echo "apksigner not found, using keytool"
            keytool -printcert -jarfile app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | grep -i sha1
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pullarao-android-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            build/reports
          retention-days: 7
          if-no-files-found: ignore
